version: '3.7'

{% if cookiecutter.observability %}
x-otel-common-envs: &otel-common-envs
  OTEL_SERVICE_NAMESPACE: $${OTEL_SERVICE_NAMESPACE:-{{cookiecutter.repostory_name}}}
  OTEL_DEPLOYMENT_ENVIRONMENT: $${OTEL_DEPLOYMENT_ENVIRONMENT:-production}

x-otel-app-envs: &otel-app-envs
  <<: *otel-common-envs
  OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
  OTEL_SERVICE_INSTANCE_ID: $${OTEL_SERVICE_INSTANCE_ID:-}
{% endif %}

# Shared awslogs options; each service only sets its own tag.
x-awslogs-options: &awslogs-options
  awslogs-region: ${region}
  awslogs-group: /aws/ec2/${name}-${env}

services:
  redis:
    {% if cookiecutter.use_valkey %}
    image: mirror.gcr.io/valkey/valkey:8.1-alpine
    command: valkey-server --appendonly yes
    healthcheck:
      test: valkey-cli ping
    {% else %}
    image: mirror.gcr.io/redis:6-alpine
    command: redis-server --appendonly yes
    healthcheck:
      test: redis-cli ping
    {% endif %}
    restart: unless-stopped
    volumes:
      - redis-data:/data
    logging:
      driver: awslogs
      options:
        <<: *awslogs-options
        tag: '$${INSTANCE_ID_SUBST}-redis'

  app:
    image: ${ecr_base_url}/${ecr_image}
    init: true
    restart: always
    env_file: ./.env
    healthcheck:
      test: ["CMD", "./healthcheck.py", "/var/run/gunicorn/gunicorn.sock"]
    {% if cookiecutter.monitoring or cookiecutter.observability %}
    environment:
      {% if cookiecutter.monitoring %}
      PROMETHEUS_MULTIPROC_DIR: /prometheus-multiproc-dir
      PROMETHEUS_USE_FLOCK: "1"
      {% endif %}
      {% if cookiecutter.observability %}
      <<: *otel-app-envs
      OTEL_SERVICE_NAME: app
      {% endif %}
    {% endif %}
    volumes:
      - backend-static:/var/static
      - gunicorn-socket:/var/run/gunicorn
      - ./media:$${MEDIA_ROOT}
    {% if cookiecutter.monitoring %}
      - ./prometheus-metrics:/prometheus-multiproc-dir
    {% endif %}
    depends_on:
      - redis
      {% if cookiecutter.observability %}
      - alloy
      {% endif %}
    logging: &app_logging
      driver: awslogs
      options:
        <<: *awslogs-options
        tag: '$${INSTANCE_ID_SUBST}-app'

  {% if cookiecutter.use_celery %}
  celery-worker:
    image: ${ecr_base_url}/${ecr_image}
    init: true
    healthcheck:
      test: celery -A {{cookiecutter.django_project_name}} status > /dev/null || exit 1
    restart: unless-stopped
    env_file: ./.env
    environment:
      DEBUG: "off"
      {% if cookiecutter.monitoring %}
      PROMETHEUS_MULTIPROC_DIR: /prometheus-multiproc-dir/celery-worker
      PROMETHEUS_USE_FLOCK: "1"
      {% endif %}
      {% if cookiecutter.observability %}
      <<: *otel-app-envs
      OTEL_SERVICE_NAME: celery
      {% endif %}
    command: ./celery-entrypoint.sh
    {% if cookiecutter.monitoring %}
    volumes:
      - ./prometheus-metrics/celery-worker:/prometheus-multiproc-dir/celery-worker
    {% endif %}
    tmpfs: /run
    depends_on:
      - redis
      {% if cookiecutter.observability %}
      - alloy
      {% endif %}
    logging:
      driver: awslogs
      options:
        <<: *awslogs-options
        tag: '$${INSTANCE_ID_SUBST}-celery-worker'

  celery-beat:
    image: ${ecr_base_url}/${ecr_image}
    init: true
    restart: unless-stopped
    env_file: ./.env
    environment:
      DEBUG: "off"
      {% if cookiecutter.observability %}
      <<: *otel-app-envs
      OTEL_SERVICE_NAME: celery-beat
      {% endif %}
    command: nice celery -A {{cookiecutter.django_project_name}} beat -l INFO --schedule /tmp/celerybeat-schedule -f /tmp/logs/celery-beat.log
    volumes:
      - ./logs:/tmp/logs
    depends_on:
      - redis
      {% if cookiecutter.observability %}
      - alloy
      {% endif %}
    logging:
      driver: awslogs
      options:
        <<: *awslogs-options
        tag: '$${INSTANCE_ID_SUBST}-celery-beat'

  {% if cookiecutter.use_flower %}
  celery-flower:
    image: ${ecr_base_url}/${ecr_image}
    healthcheck:
      test: wget --user "$${CELERY_FLOWER_USER}" --password "$${CELERY_FLOWER_PASSWORD}" -qO- 127.0.0.1:5555 > /dev/null || exit 1
    init: true
    restart: unless-stopped
    env_file: ./.env
    environment:
      - DEBUG=off
      - FLOWER_TASK_RUNTIME_METRIC_BUCKETS=1,2,3,5,10,20,30,45,60,120,180,240,300,600,inf
    command: celery --app={{cookiecutter.django_project_name}} --broker="$${CELERY_BROKER_URL}" flower --basic_auth="$${CELERY_FLOWER_USER}:$${CELERY_FLOWER_PASSWORD}"
    depends_on:
      - celery-worker
    logging:
      driver: awslogs
      options:
        <<: *awslogs-options
        tag: '$${INSTANCE_ID_SUBST}-celery-flower'
  {% endif %}
  {% endif %}

  backups:
    image: ${ecr_base_url}/${ecr_backups_image}
    init: true
    restart: unless-stopped
    environment:
      - DATABASE_URL=$${DATABASE_URL}
      - BACKUP_LOCAL_DIR=/var/backups
      - BACKUP_LOCAL_ROTATE_KEEP_LAST=$${BACKUP_LOCAL_ROTATE_KEEP_LAST}
      - B2_BUCKET=$${BACKUP_B2_BUCKET}
      - B2_FOLDER=$${BACKUP_B2_FOLDER}
      - B2_APPLICATION_KEY_ID=$${BACKUP_B2_APPLICATION_KEY_ID}
      - B2_APPLICATION_KEY=$${BACKUP_B2_APPLICATION_KEY}
      - EMAIL_HOST=$${EMAIL_HOST}
      - EMAIL_PORT=$${EMAIL_PORT}
      - EMAIL_HOST_USER=$${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=$${EMAIL_HOST_PASSWORD}
      - EMAIL_TARGET=$${EMAIL_TARGET}
      - DEFAULT_FROM_EMAIL=$${DEFAULT_FROM_EMAIL}
      - SENTRY_DSN=$${SENTRY_DSN}
    volumes:
      - backups:/var/backups
    logging:
      <<: *app_logging

  {% if cookiecutter.monitoring %}
  node-exporter:
    image: ghcr.io/reef-technologies/node-exporter-aws-ec2:latest
    container_name: node-exporter
    restart: unless-stopped
    network_mode: host
    pid: host
    volumes:
      - /:/host:ro,rslave
      - nodeexporter_collectors:/textfile_collectors
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      {% if cookiecutter.vulnerabilities_scanning %}
      - '--collector.textfile.directory=textfile_collectors'
      {% endif %}
    logging: &exporter_logging
      driver: journald
      options:
        tag: '{% raw %}{###{.Name}###}{% endraw %}'

  cadvisor:
    image: ghcr.io/google/cadvisor:0.55.1
    container_name: cadvisor
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    restart: unless-stopped
    logging:
      <<: *exporter_logging
  {% endif %}

  nginx:
    image: 'ghcr.io/reef-technologies/nginx-rt:v1.3.0'
    restart: unless-stopped
    healthcheck:
      test: wget -q --spider http://0.0.0.0:8000/alive/ || exit 1
    {% if cookiecutter.observability %}
    environment:
      <<: *otel-common-envs
      OTEL_SERVICE_NAME: nginx
      OTEL_SERVICE_INSTANCE_ID: $${OTEL_SERVICE_INSTANCE_ID:-prod-1}
      OTEL_SERVICE_VERSION: $${GIT_SHA:-unknown}
    {% endif %}
    depends_on:
      - app
      {% if cookiecutter.monitoring %}
      - cadvisor
      - node-exporter
      {% endif %}
      {% if cookiecutter.observability %}
      - alloy
      {% endif %}
    command: nginx -g 'daemon off;'
    ports:
      {% if cookiecutter.monitoring %}
      - 10443:10443
      {% endif %}
      - 8000:8000
    volumes:
      - ./nginx/templates:/etc/nginx/templates
      - ./nginx/config_helpers:/etc/nginx/config_helpers
      - backend-static:/srv/static:ro
      - ./media:/srv/media:ro
      - ./nginx/monitoring_certs:/etc/monitoring_certs
      - gunicorn-socket:/var/run/gunicorn:ro
    logging:
      driver: awslogs
      options:
        <<: *awslogs-options
        tag: '$${INSTANCE_ID_SUBST}-nginx'
    {% if cookiecutter.monitoring %}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    {% endif %}
  {% if cookiecutter.vulnerabilities_scanning %}
  vulnrelay:
    image: 'ghcr.io/reef-technologies/vulnrelay:latest'
    container_name: vulnrelay
    restart: unless-stopped
    env_file: ./.vuln.env
    environment:
      - METRICS_DIR=/app/metrics
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - nodeexporter_collectors:/app/metrics
    logging:
      driver: awslogs
      options:
        <<: *awslogs-options
        tag: '$${INSTANCE_ID_SUBST}-vulnrelay'
  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: --interval 7200 vulnrelay
    logging:
      driver: awslogs
      options:
        <<: *awslogs-options
        tag: '$${INSTANCE_ID_SUBST}-vulnrelay'
  {% endif %}

  {% if cookiecutter.observability %}
  alloy:
    image: grafana/alloy:v1.15.1
    restart: unless-stopped
    environment:
      - LOKI_URL=$${LOKI_URL}
      - LOKI_USER=$${LOKI_USER}
      - LOKI_PASSWORD=$${LOKI_PASSWORD}
      - TEMPO_URL=$${TEMPO_URL}
      - TEMPO_USER=$${TEMPO_USER}
      - TEMPO_PASSWORD=$${TEMPO_PASSWORD}
    volumes:
      - ./alloy:/etc/alloy
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy
    command:
      - run
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    logging:
      driver: awslogs
      options:
        <<: *awslogs-options
        tag: '$${INSTANCE_ID_SUBST}-alloy'
  {% endif %}

volumes:
  backend-static:
  backups:
  redis-data:
  gunicorn-socket:
  nodeexporter_collectors:
  {% if cookiecutter.observability %}
  alloy-data:
  {% endif %}
